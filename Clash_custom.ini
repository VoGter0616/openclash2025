[custom]
; ==========================================================
; 规则生成器
; ==========================================================
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Traffic|Reset|Remaining|Expire|Official|Website


custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`(?i)(港|hk|新加坡|sg|台|tw)`https://cp.cloudflare.com/generate_204`600,,50
custom_proxy_group=🧱 稳定兜底`fallback`(?i)(港|hk|日本|jp|新加坡|sg|台|tw|韩|kr|美|us)`https://www.gstatic.com/generate_204`300
custom_proxy_group=香港-自动`url-test`(广港|香港|HK|Hong Kong|🇭🇰|HongKong)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=台湾-自动`url-test`(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=日本-自动`url-test`(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=韩国-自动`url-test`(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=新加坡-自动`url-test`(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=美国-自动`url-test`(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=🌍 冷门节点`select`(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)

; --- AI 相关
custom_proxy_group=🧠 AI`select`[]新加坡-自动`[]美国-自动`[]台湾-自动`[]日本-自动`[]🧭 手动选择`[]DIRECT

; --- 业务专用组
custom_proxy_group=🔒 隐私 DNS`fallback`[]香港-自动`[]新加坡-自动`[]美国-自动`[]🧱 稳定兜底`https://1.1.1.1/generate_204`180
