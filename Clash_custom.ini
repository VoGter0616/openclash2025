; Adobe：允许一键禁止联网
custom_proxy_group=🟥 Adobe`select`[]DIRECT`[]香港-自动`[]美国-自动`[]新加坡-自动`[]🧭 手动选择

; ==========================================================
; Default / 漏网之鱼
; ==========================================================
; Default 出口
custom_proxy_group=🌍 国外`fallback`[]♻️ 自动选择`[]🧱 稳定兜底`https://cp.cloudflare.com/generate_204`180
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外`[]🧭 手动选择`[]DIRECT

; ==========================================================
; 非标端口
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]DIRECT

; ==========================================================
; 规则（自上而下优先级）
; ==========================================================

; --- Adobe 屏蔽 ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOSITE,adobe-activation

; --- 国内银行/金融服务/小米IoT ---
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/VoGter0616/openclash2025/main/rule/Clash/Direct_Merged.list,28800

; --- AI 专项 ---
ruleset=🧠 AI,clash-classic:https://raw.githubusercontent.com/VoGter0616/openclash2025/main/rule/Clash/AI_Merged.list,28800
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🧠 AI,[]GEOSITE,anthropic

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

