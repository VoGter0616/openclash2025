[custom]
; ==========================================================
; 规则生成器
; ==========================================================
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================
;屏蔽adobe 给足权限排最上，单纯在应用层选择屏蔽只会屏蔽国外链接，因为国内也能访问adobe部分页面，因此在openclash中如果选择了绕过大陆，
;国内能访问的adobe域名或ip也就跟着绕过了内核直接走了直连，所以还需在【插件设置】-【流量控制】-【绕过指定区域 IPv4 黑名单中】加上adobe域名：如下
;adobe.com
;adobelogin.com
;adobe.io
;behance.net

ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 强制拦截Windows、Apple、Android 系统以及主流 CDN 服务商常用的 IPv6 连通性测试和探测域名 （需要使用ipv6注释掉此规则）---
ruleset=REJECT,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/List/IPv6_Block.yaml,28800

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🌍 国外,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🌍 国外,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOSITE,xiaomi

; --- 国内可用 / 下载 / BT ---

ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/SteamCN/SteamCN.yaml,28800
ruleset=DIRECT,[]GEOSITE,nvidia
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-public-tracker

;------------请在下方区域内添加应用---------------
; ==========================================================
; --- 若使用下方geo没有匹配到可以用下方url来匹配，需先在下方删除该应用的ruleset ---
;https://github.com/Aethersailor/Custom_OpenClash_Rules/tree/main/rule
;https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Clash
; --- ruleset=🟦 OKX,clash-domain:https://xxx/okx.yaml,86400
;可以转换为：https://testingcf.jsdelivr.net/gh/{用户名}/{仓库名}@{分支名}/{文件路径}
; ==========================================================
;自定义url匹配规则区域

; ==========================================================

; --- 1. AI 专项  ---
ruleset=🧠 AI,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🧠 AI,[]GEOSITE,anthropic
ruleset=🧠 AI,[]GEOSITE,google-gemini

; --- 2. 流媒体 & 社交 ---
ruleset=🎞️ YouTube,[]GEOSITE,youtube
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎥 HBO,[]GEOSITE,hbo
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📱 社交,[]GEOSITE,telegram
ruleset=📱 社交,[]GEOIP,telegram,no-resolve
ruleset=📱 社交,[]GEOSITE,facebook
ruleset=📱 社交,[]GEOSITE,instagram
ruleset=📱 社交,[]GEOSITE,twitter
ruleset=📱 社交,[]GEOSITE,discord
ruleset=📱 社交,[]GEOIP,discord,no-resolve
ruleset=📱 社交,[]GEOSITE,category-communication
ruleset=📱 社交,[]GEOSITE,category-social-media-!cn

; --- 3. 开发 / 工具 ---
ruleset=📘 GitHub,[]GEOSITE,github
ruleset=📘 GitHub,[]GEOIP,github,no-resolve
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🔍 Google,[]GEOSITE,google
ruleset=🔍 Google,[]GEOIP,google,no-resolve
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=Ⓜ️ Microsoft,[]GEOIP,microsoft,no-resolve
ruleset=Ⓜ️ OneDrive,[]GEOSITE,onedrive

; --- 4. 游戏 ---
ruleset=🕹️ 游戏,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Steam/Steam.yaml,28800
ruleset=🕹️ 游戏,[]GEOSITE,epicgames
ruleset=🕹️ 游戏,[]GEOSITE,nintendo
ruleset=🕹️ 游戏,[]GEOSITE,ea
ruleset=🕹️ 游戏,[]GEOSITE,ubisoft
ruleset=🕹️ 游戏,[]GEOSITE,blizzard
ruleset=🕹️ 游戏,[]GEOSITE,sony

;--- 5. 补充专项规则 ---
ruleset=💰 金融,[]GEOSITE,binance
ruleset=💰 金融,[]GEOSITE,okx

; --- 6. 国外通用规则 ---
ruleset=🌍 国外,[]GEOSITE,geolocation-!cn
ruleset=🌍 国外,[]GEOSITE,googlefcm
ruleset=🌍 国外,[]GEOSITE,cloudflare
ruleset=🌍 国外,[]GEOIP,cloudflare,no-resolve
ruleset=🌍 国外,[]GEOSITE,gfw
ruleset=🌍 国外,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Global/Global.yaml,28800

; --- 7. 非标端口 ---
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; --- 8.最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 应用分流策略组（需要完整对应上方规则调用的策略组名称）
; ==========================================================
; --- AI 相关
custom_proxy_group=🧠 AI`fallback`[]美国-自动`[]新加坡-自动`[]日本-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300

; --- 流媒体
custom_proxy_group=🎞️ YouTube`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=🎵 Spotify`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=🎬 Disney+`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=🎥 HBO`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]美国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=📺 Bahamut`select`[]台湾-自动`[]🌐 手动

; --- 短视频 & 社交
custom_proxy_group=🎶 TikTok`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]美国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT
custom_proxy_group=📱 社交`select`[]香港-自动`[]新加坡-自动`[]日本-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]🌍 冷门节点`[]🌐 手动`[]DIRECT

; --- 开发者工具 / 技术网站
custom_proxy_group=📘 GitHub`url-test`(?i)(港|hk|新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔍 Google`fallback`[]美国-自动`[]新加坡-自动`[]日本-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=Ⓜ️ OneDrive`url-test`(?i)(港|hk|新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50
