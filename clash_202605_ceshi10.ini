[custom]
; ==========================================================
; 规则生成器
; ==========================================================
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Traffic|Reset|Remaining|Expire|Official|Website


custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`(?i)(港|hk|日本|jp|新加坡|sg|台|tw)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🧱 稳定兜底`fallback`(?i)(港|hk|日本|jp|新加坡|sg|台|tw|韩|kr|美|us)`https://www.gstatic.com/generate_204`300
custom_proxy_group=香港-自动`url-test`(广港|香港|HK|Hong Kong|🇭🇰|HongKong)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=台湾-自动`url-test`(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本-自动`url-test`(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=韩国-自动`url-test`(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡-自动`url-test`(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国-自动`url-test`(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌍 冷门节点`select`(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)

; --- AI 相关
custom_proxy_group=🧠 AI`fallback`[]美国-自动`[]新加坡-自动`[]日本-自动`https://www.gstatic.com/generate_204`300

; --- 业务专用组
custom_proxy_group=🔒 隐私 DNS`fallback`[]香港-自动`[]美国-自动`https://www.gstatic.com/generate_204`300
custom_proxy_group=🏠 我的群晖`select`[]DIRECT`[]🧭 手动选择

; --- 流媒体
custom_proxy_group=🎞️ YouTube`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🎵 Spotify`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🎬 Disney+`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🎥 HBO`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]美国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=📺 Bahamut`select`[]台湾-自动`[]🧭 手动选择

; --- 短视频 & 社交
custom_proxy_group=🎶 TikTok`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]美国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=📨 Telegram`select`[]香港-自动`[]新加坡-自动`[]日本-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=📱 社交`select`[]香港-自动`[]新加坡-自动`[]日本-自动`[]台湾-自动`[]韩国-自动`[]美国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT

; --- 开发者工具 / 技术网站
custom_proxy_group=📘 GitHub`url-test`(?i)(港|hk|新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔍 Google`fallback`[]美国-自动`[]新加坡-自动`[]日本-自动`[]香港-自动`https://www.gstatic.com/generate_204`300
custom_proxy_group=Ⓜ️ OneDrive`url-test`(?i)(港|hk|新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Ⓜ️ Microsoft`select`[]DIRECT`[]美国-自动`[]新加坡-自动`[]🧭 手动选择
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]美国-自动`[]🧭 手动选择
custom_proxy_group=🚝 测速工具`select`[]DIRECT`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]美国-自动`[]🌍 冷门节点`[]🧭 手动选择

; --- 游戏类
custom_proxy_group=🕹️ 游戏`select`[]日本-自动`[]韩国-自动`[]香港-自动`[]新加坡-自动`[]美国-自动`[]🧭 手动选择`[]DIRECT

; --- 广告拦截 
custom_proxy_group=🚫 广告拦截`select`[]REJECT`[]DIRECT`[]🧭 手动选择

; Adobe：允许一键禁止联网
custom_proxy_group=🟥 Adobe`select`[]DIRECT`[]♻️ 自动选择`[]🧱 稳定兜底`[]🧭 手动选择

; ==========================================================
; Default / 漏网之鱼
; ==========================================================
; Default 出口
custom_proxy_group=🌍 国外`fallback`[]♻️ 自动选择`[]🧱 稳定兜底`https://www.gstatic.com/generate_204`300
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外`[]🧭 手动选择`[]DIRECT

; ==========================================================
; 非标端口
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]DIRECT

; ==========================================================
; 规则（自上而下优先级）
; ==========================================================
;屏蔽adobe 给足权限排最上，单纯在应用层选择屏蔽只会屏蔽国外链接，因为国内也能访问adobe部分页面，因此在openclash中如果选择了绕过大陆，
;国内能访问的adobe域名或ip也就跟着绕过了内核直接走了直连，所以还需在【插件设置】-【流量控制】-【绕过指定区域 IPv4 黑名单中】加上adobe域名：如下
;adobe.com
;adobelogin.com
;adobe.io
;behance.net

; --- 广告拦截 (放在所有规则最上方) ---
; 秋风广告规则 (推荐)
ruleset=🚫 广告拦截,clash-domain:https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml,28800
; 基础广告拦截
ruleset=🚫 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list

; --- Adobe 屏蔽  ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 国内银行/金融服务/小米IoT ---
ruleset=DIRECT,https://raw.githubusercontent.com/VoGter0616/openclash2025/main/List/Bank_CN.list
ruleset=DIRECT,https://raw.githubusercontent.com/VoGter0616/openclash2025/main/List/Xiaomi_IoT.list

; --- AI 专项  ---
ruleset=🧠 AI,https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.list
ruleset=🧠 AI,https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Gemini/Gemini.list
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🧠 AI,[]GEOSITE,anthropic

