name: Update AI Rules
on:
  schedule:
    - cron: '0 4 * * *' # 每天北京时间 12:00 (UTC 4:00) 运行
  workflow_dispatch:      # 允许你随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予写入仓库内容的权限
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Merge Script
        run: python .github/py/merge_ai.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 先移除根目录下可能残留的旧文件（防止冲突）
          git rm -f AI_Merged.list || true
          # 添加新目录下的所有内容
          git add rule/Clash/AI_Merged.list
          git commit -m "Auto update AI rules to rule/Clash/" || exit 0
          git push origin main
