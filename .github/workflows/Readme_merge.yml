name: Update Readme
on:
  workflow_dispatch:      # 允许你随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Merge Script
        run: python .github/py/merge_rules.py # 你原本的合并脚本
        
      # 运行自动生成 README 脚本
      - name: Generate README
        run: python .github/py/generate_readme.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🌟 修改点：直接打包添加整个 rule 文件夹（包括里面的所有 .list 和新生成的 README.md）
          git add rule/
          
          git commit -m "Auto update rules and refresh rule/README.md" || exit 0
          git push origin main
