name: Update Readme 
on:
  schedule:
    - cron: '0 4 * * *' # 每天北京时间 12:00 (UTC 4:00) 运行
  workflow_dispatch:      # 允许你随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予写入仓库内容的权限
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Merge Script
        run: python .github/py/generate_readme.py 

      # 运行自动生成 README 脚本
      - name: Generate README
        run: python .github/py/generate_readme.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🌟 修改点：精准添加 rule 文件夹下的所有 list 文件，以及根目录的 README.md
          git add rule/*.list
          git add README.md
          
          git commit -m "Auto update rules and refresh README.md" || exit 0
          git push origin main
