[custom]
; ==========================================================
; 规则生成器
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================

exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|说明|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website|Test|测试|备用|过期|失效

; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================

;屏蔽adobe 给足权限排最上，单纯在应用层选择屏蔽只会屏蔽国外链接，因为国内也能访问adobe部分页面，因此在openclash中如果选择了绕过大陆，
;国内能访问的adobe域名或ip也就跟着绕过了内核直接走了直连，所以还需在【流量控制】菜单下的【绕过指定区域 IPv4 黑名单中】加上adobe域名：如下
;adobe.com
;adobelogin.com
;adobe.io
;behance.net

ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🌍 国外,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🌍 国外,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOIP,lan,no-resolve
ruleset=DIRECT,[]GEOSITE,category-speedtest

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

;------------请在下方区域内添加应用---------------
; --- 1. AI 专项  ---
ruleset=🧠 AI,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🧠 AI,[]GEOSITE,anthropic
ruleset=🧠 AI,[]GEOSITE,google-gemini

; --- 2. 流媒体 & 社交 ---
ruleset=🎞️ YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎥 HBO,[]GEOSITE,hbo
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📱 Telegram,[]GEOSITE,telegram
ruleset=📱 Facebook,[]GEOSITE,facebook
ruleset=📱 Instagram,[]GEOSITE,instagram
ruleset=📱 社交,[]GEOSITE,twitter
ruleset=📱 社交,[]GEOSITE,category-communication
ruleset=📱 社交,[]GEOSITE,category-social-media-!cn

; --- 3. 开发 / 工具 ---
ruleset=📘 GitHub,[]GEOSITE,github
ruleset=📘 GitHub,[]GEOIP,github,no-resolve
ruleset=🔍 Google,[]GEOSITE,google
ruleset=🔍 Google,[]GEOIP,google,no-resolve
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=Ⓜ️ Microsoft,[]GEOIP,microsoft,no-resolve
ruleset=Ⓜ️ OneDrive,[]GEOSITE,onedrive

; --- 4. 游戏 ---
ruleset=🕹️ 游戏,[]GEOSITE,steam
ruleset=🕹️ 游戏,[]GEOSITE,epicgames
ruleset=🕹️ 游戏,[]GEOSITE,nintendo

; --- 5. 国外通用规则 (Cloudflare/GFW 等) ---
ruleset=🌍 国外,[]GEOSITE,geolocation-!cn
ruleset=🌍 国外,[]GEOSITE,googlefcm
ruleset=🌍 国外,[]GEOSITE,cloudflare
ruleset=🌍 国外,[]GEOIP,cloudflare,no-resolve
ruleset=🌍 国外,[]GEOSITE,gfw

; --- 6. 非标端口 ---
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; --- 7.最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 2) 应用分流策略组（UI 主入口，不越权）
; ==========================================================
; --- AI 相关（OpenAI/Claude/Gemini 等）
custom_proxy_group=🧠 AI`fallback`[]美国-自动`[]新加坡-自动`[]日本-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300

; --- 流媒体（优先选择本地/最优节点以保证视频流畅）
custom_proxy_group=🎞️ YouTube`fallback`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=🎥 Netflix`fallback`[]美国-自动`[]日本-自动`[]新加坡-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=🎬 Disney+`fallback`[]新加坡-自动`[]美国-自动`[]日本-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=🎥 HBO`fallback`[]美国-自动`[]🌍 冷门节点`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=📺 Bahamut`select`[]台湾-自动`[]🌐 手动

; --- 短视频 & 社交
custom_proxy_group=🎵 TikTok`fallback`[]日本-自动`[]新加坡-自动`[]韩国-自动`[]美国-自动`https://www.gstatic.com/generate_204`300
custom_proxy_group=📱 Telegram`fallback`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=📱 Facebook`fallback`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=📱 Instagram`fallback`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=📱 社交`fallback`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300

; --- 开发者工具 / 技术网站
custom_proxy_group=📘 GitHub`url-test`(?i)(新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔍 Google`fallback`[]新加坡-自动`[]美国-自动`[]日本-自动`[]🌐 手动`https://www.gstatic.com/generate_204`300
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]美国-自动`[]🌐 手动
custom_proxy_group=Ⓜ️ Microsoft`select`[]DIRECT`[]美国-自动`[]新加坡-自动`[]🌐 手动
custom_proxy_group=Ⓜ️ OneDrive`url-test`(?i)(新加坡|sg|日本|jp|美国|us)`https://www.gstatic.com/generate_204`300,,50

; --- 游戏类（Steam/Epic 等）
custom_proxy_group=🕹️ 游戏`fallback`(?i)(日|jp|韩|kr)`https://www.gstatic.com/generate_204`120

; Adobe：允许一键禁止联网
custom_proxy_group=🟥 Adobe`select`[]🚀 自动选择`[]🧱 稳定兜底`[]🌐 手动`[]DIRECT

; ==========================================================
; 3) Default / 漏网之鱼（唯一允许全节点）
; ==========================================================
; Default 出口
custom_proxy_group=🌍 国外`select`[]🚀 自动选择`[]🧱 稳定兜底`[]DIRECT

custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外`[]DIRECT

; ==========================================================
; 4) 非标端口
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼


; ==========================================================
; 5) 国家节点测速组（保持不动）
; ==========================================================
; 全节点（允许任何节点显示）
custom_proxy_group=🌐 手动`select`.*
custom_proxy_group=🚀 自动选择`url-test`(?i)(日|jp|新加坡|sg|台|tw|美|us)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🧱 稳定兜底`fallback`(?i)(港|hk|日|jp|新加坡|sg|台|tw)`https://www.gstatic.com/generate_204`300
custom_proxy_group=香港-自动`url-test`(?i)(港|hk|hong|🇭🇰)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=澳门-自动`url-test`(?i)(澳门|澳門|macau|🇲🇴)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=台湾-自动`url-test`(?i)(台|tw|taiwan|🇹🇼)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本-自动`url-test`(?i)(日本|japan|tokyo|osaka|🇯🇵|jp)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=韩国-自动`url-test`(?i)(韩|kr|korea|seoul|🇰🇷)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡-自动`url-test`(?i)(新加坡|sg|singapore|🇸🇬)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国-自动`url-test`(?i)(美国|us|usa|america|🇺🇸)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌍 冷门节点`select`(?i)(律宾|印度|巴西|越南|埃及|泰国|印尼|土耳其|阿根廷|俄罗斯|尼日利亚|巴基斯坦)
