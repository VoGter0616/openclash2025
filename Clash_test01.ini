[custom]
; ==========================================================
; 规则生成器
; ==========================================================
enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 规则（自上而下金字塔优先级）
; ==========================================================

; --- 1. 最高优先级：本地私网与局域网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- 2. 核心直连防线：国内银行、金融、IoT与手动直连补丁 ---
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Direct_Merged.list,28800
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- 3. 核心代理防线：AI 专项 ---
ruleset=🧠 AI,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/AI_Merged.list,28800
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

; --- 4. 大带宽避浪：国内通用 CDN 加速与游戏大带宽下载 ---
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/CDN_Merged.list,28800
;国内游戏域名直连
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download

; ==========================================================
; 精细化应用分流区域（匹配特定软件与服务）
; ==========================================================

; --- 社交 & 通讯 ---
ruleset=📱 社交,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Social_Merged.list,28800
ruleset=📱 社交,[]GEOSITE,category-communication
ruleset=📱 社交,[]GEOSITE,category-social-media-!cn
ruleset=📱 社交,[]GEOIP,telegram,no-resolve
ruleset=📱 社交,[]GEOIP,facebook,no-resolve
ruleset=📱 社交,[]GEOIP,twitter,no-resolve

; --- 影音流媒体 ---
ruleset=🎞️ YouTube,[]GEOSITE,youtube
;YouTube 核心视频流及内容补丁
ruleset=🎞️ YouTube,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/YouTube_Video.list
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎵 Spotify,[]GEOSITE,spotify
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎥 HBO,[]GEOSITE,hbo
ruleset=📺 Bahamut,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Bahamut/Bahamut.list

; --- 谷歌专项 ---
ruleset=🇬 Google,[]GEOSITE,google
ruleset=🇬 Google,[]GEOIP,google,no-resolve

; --- 开发 & 常用工具 ---
ruleset=📘 GitHub,[]GEOSITE,github
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=Ⓜ️ OneDrive,[]GEOSITE,onedrive
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOSITE,adobe-activation

; --- 游戏联机 ---
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🕹️ 游戏,[]GEOSITE,category-games

; --- 功能组与非标端口 ---
ruleset=🔒 隐私 DNS,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Global_DNS.list
ruleset=🏠 我的群晖,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Synology_DDNS.list
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Custom_Port.list
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment

; ==========================================================
; 兜底拦截网
; ==========================================================

; --- 国外通用域名大包兜底 ---
ruleset=🌍 国外,clash-classic:https://testingcf.jsdelivr.net/gh/VoGter0616/openclash2025@main/rule/Clash/Custom_Proxy.list
ruleset=🌍 国外,[]GEOSITE,geolocation-!cn
ruleset=🌍 国外,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Proxy/Proxy.list

; --- 基础国内直连大包兜底 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 漏网之鱼 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Traffic|Reset|Remaining|Expire|Official|Website

; ==========================================================
; 节点池
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`(?i)(港|hk|新加坡|sg|台|tw)`https://cp.cloudflare.com/generate_204`600,,50
custom_proxy_group=🧱 稳定兜底`fallback`(?i)(港|hk|日本|jp|新加坡|sg|台|tw|韩|kr|美|us)`https://www.gstatic.com/generate_204`300
custom_proxy_group=香港-自动`url-test`(广港|香港|HK|Hong Kong|🇭🇰|HongKong)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=台湾-自动`url-test`(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=日本-自动`url-test`(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=韩国-自动`url-test`(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=新加坡-自动`url-test`(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=美国-自动`url-test`(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)`https://cp.cloudflare.com/generate_204`400,,100
custom_proxy_group=🌍 冷门节点`select`(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)

; --- AI 相关
custom_proxy_group=🧠 AI`select`[]新加坡-自动`[]美国-自动`[]台湾-自动`[]日本-自动`[]🧭 手动选择`[]DIRECT

; --- 业务专用组
custom_proxy_group=🔒 隐私 DNS`fallback`[]香港-自动`[]新加坡-自动`[]美国-自动`[]🧱 稳定兜底`https://1.1.1.1/generate_204`180
custom_proxy_group=🏠 我的群晖`select`[]DIRECT`[]香港-自动`[]美国-自动`[]新加坡-自动`[]🧭 手动选择

; --- 流媒体
custom_proxy_group=🎞️ YouTube`select`[]香港-自动`[]台湾-自动`[]新加坡-自动`[]美国-自动`[]日本-自动`[]韩国-自动`[]🌍 冷门节点`[]🧭 手动选择`[]DIRECT
