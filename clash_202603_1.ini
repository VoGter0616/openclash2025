;========================
; 1. 节点池（按地区排序，方便策略组引用）
;========================
custom_proxy_group=所有-手动`select`.*
custom_proxy_group=香港-自动`url-test`(?i)(港|hk|hong|🇭🇰)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=台湾-自动`url-test`(?i)(台|tw|taiwan|🇹🇼)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=日本-自动`url-test`(?i)(日本|japan|tokyo|osaka|🇯🇵|jp)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=韩国-自动`url-test`(?i)(韩|kr|korea|seoul|🇰🇷)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=新加坡-自动`url-test`(?i)(新加坡|sg|singapore|🇸🇬)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=美国-自动`url-test`(?i)(美国|us|usa|america|🇺🇸)`http://www.gstatic.com/generate_204`600,5,50
custom_proxy_group=🚀 自动选择`url-test`.*`http://www.gstatic.com/generate_204`600,5,50

;========================
; 2. 策略组（按用途+逻辑顺序）
; 内部节点优先顺序：地区节点 → 🚀 自动选择 → DIRECT → 所有-手动
;========================

; --- AI 相关（OpenAI/Claude/Gemini 等）
custom_proxy_group=✨ AI`select`[]美国-自动`[]日本-自动`[]新加坡-自动`[]🚀 自动选择`[]所有-手动

; --- 流媒体（优先选择本地/最优节点以保证视频流畅）
custom_proxy_group=🎞️ YouTube`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]所有-手动
custom_proxy_group=🎥 Netflix`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]所有-手动
custom_proxy_group=🎬 Disney+`select`[]新加坡-自动`[]美国-自动`[]所有-手动
custom_proxy_group=🎥 HBO`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]所有-手动
custom_proxy_group=📺 Bahamut`select`[]台湾-自动`[]香港-自动`[]所有-手动

; --- 短视频 & 社交
custom_proxy_group=👯 TikTok`select`[]新加坡-自动`[]日本-自动`[]韩国-自动`[]🚀 自动选择`[]所有-手动
custom_proxy_group=📱 社交`select`[]香港-自动`[]新加坡-自动`[]日本-自动`[]🚀 自动选择`[]所有-手动

; --- 开发者工具 / 技术网站
custom_proxy_group=📘 GitHub`select`[]香港-自动`[]美国-自动`[]🚀 自动选择`[]所有-手动`[]DIRECT
custom_proxy_group=🔍 Google`select`[]香港-自动`[]日本-自动`[]美国-自动`[]🚀 自动选择`[]所有-手动
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]香港-自动`[]美国-自动`[]🚀 自动选择`[]所有-手动
custom_proxy_group=Ⓜ️ Microsoft`select`[]DIRECT`[]香港-自动`[]美国-自动`[]🚀 自动选择`[]所有-手动

; --- 游戏类（Steam/Epic 等）
custom_proxy_group=🕹️ 游戏`select`[]香港-自动`[]台湾-自动`[]日本-自动`[]韩国-自动`[]新加坡-自动`[]🚀 自动选择`[]所有-手动

; --- 直连 & 备用节点
custom_proxy_group=🌍 国外`select`[]香港-自动`[]新加坡-自动`[]日本-自动`[]美国-自动`[]🚀 自动选择`[]所有-手动
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]所有-手动
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 自动选择`[]DIRECT`[]所有-手动

